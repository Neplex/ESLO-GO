name: Fetch COCOON Data

on:
  schedule:
    - cron: "0 3 * * 1"

  workflow_dispatch:

  pull_request:
    paths:
      - "scripts/fetch.mjs"
      - "data/query.rq"
      - ".github/workflows/fetch-data.yml"

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run script
        run: node scripts/fetch.mjs

      - name: Commit & Push changes
        uses: actions-js/push@v1.5
        if: github.event_name != 'pull_request'
        with:
          github_token: '${{ secrets.GITHUB_TOKEN }}'
          message: ':card_file_box: Update data from COCOON [skip ci]'
